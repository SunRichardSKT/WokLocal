name: 补充落地清单与注意事项
description: 为某个地区补充刚落地后的落地清单、做饭环境搭建和注意事项
title: "落地清单："
labels: ["starter-pack"]
body:
  - type: markdown
    attributes:
      value: |
        推荐先使用 [可视化投稿助手](https://SunRichardSKT.github.io/WokLocal/contribute/)。正文可以自由写，不必按固定购物阶段拆分。
  - type: input
    id: region
    attributes:
      label: 地区
      placeholder: 英国 / 伦敦 / 北美 / 悉尼
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 主要内容
      description: 可以自由写超市、采购、价格、宿舍限制、交通、退换货或任何值得提醒新生的信息。
      placeholder: 写下你认为刚落地最有帮助的真实经验。
    validations:
      required: true
