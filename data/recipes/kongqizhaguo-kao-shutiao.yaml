id: kongqizhaguo-kao-shutiao
name:
  zh: 空气炸锅烤薯条
  pinyin: Kongqizhaguo Kao Shutiao
  en: Air Fryer Chips
description: 英国薯条太贵？自己切土豆放空气炸锅，便宜又好吃。可以搭配空气炸锅烤鸡翅，一餐荤素都有了。
difficulty: 1
time_minutes: 25
servings: 1
cuisine: 留学生厨房菜
recipe_type: local_adapted
budget_level: low
scenarios:
  - low_budget
  - low_smoke
  - quick_15
tags:
  - 空气炸锅
  - 零食
  - 低预算
  - 快手
equipment:
  required_ids:
    - air-fryer
    - knife-board
  required:
    - 空气炸锅
    - 菜刀
    - 砧板
  substitutes_if_missing: 烤箱 200°C 烤 25-30 分钟，中途翻面。
base_ingredients:
  - ingredient_id: tudou
    amount: 1-2 个
  - ingredient_id: shiyongyou
    amount: 1 勺
  - ingredient_id: yan
    amount: 适量
  - ingredient_id: hongjiaofen
    amount: 少许（可选）
    optional: true
steps:
  - order: 1
    instruction: 土豆切成粗条（约1cm宽），泡在冷水中10分钟去除多余淀粉，捞出用厨房纸擦干。
    tip: 去淀粉是薯条酥脆的关键，不要省略泡水步骤。
  - order: 2
    instruction: 擦干后放入碗中，加1勺油、盐和辣椒粉（可选），拌匀使每根薯条都裹上油。
  - order: 3
    instruction: 放入空气炸锅，200°C 烤 15-18 分钟，中途抽出炸篮抖动翻面一次。
    tip: 不要叠放太多，尽量单层平铺才能脆。
  - order: 4
    instruction: 烤至金黄酥脆即可。趁热撒上额外盐或蘸番茄酱/蛋黄酱吃。
video_links: []
common_mistakes:
  - 土豆没泡水去淀粉——烤出来软塌不脆。
  - 切得太细——粗条（chip cut）比细条（french fry cut）更容易在空气炸锅里烤脆。
  - 放太多导致叠放——一次烤太多会变成蒸土豆，分批烤。
