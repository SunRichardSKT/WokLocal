id: naiyou-fanqie-yimian
name:
  zh: 奶油番茄意面
  pinyin: Naiyou Fanqie Yimian
  en: Creamy Tomato Pasta
description: 英国留学生性价比最高的意面之一，只需罐装番茄、double cream 和意面。酸甜浓郁，15分钟搞定。
difficulty: 1
time_minutes: 20
servings: 1
cuisine: 留学生厨房菜
recipe_type: fusion
budget_level: low
scenarios:
  - low_budget
  - tesco_friendly
  - quick_15
tags:
  - 意面
  - 低预算
  - 新手友好
  - 快手中餐
equipment:
  required_ids:
    - stockpot
    - nonstick-pan
    - colander
    - spatula
  required:
    - 深汤锅
    - 不粘平底锅
    - 沥水篮
    - 木铲
  substitutes_if_missing: 可以用一个大锅先煮面再炒酱。
base_ingredients:
  - ingredient_id: yidali-mian
    amount: 100g
  - ingredient_id: guantou-fanqie
    amount: 1 罐（400g）
  - ingredient_id: danaiyou
    amount: 100ml
  - ingredient_id: suan
    amount: 2 瓣（切末）
  - ingredient_id: zonghe-xiangcao
    amount: 1 小勺
  - ingredient_id: baitang
    amount: 半小勺
  - ingredient_id: yan
    amount: 适量
  - ingredient_id: shiyongyou
    amount: 适量
steps:
  - order: 1
    instruction: 深锅烧水加盐，放入意面按包装时间减1分钟煮至 al dente，捞出沥干，保留半杯面汤。
  - order: 2
    instruction: 不粘锅中倒橄榄油，小火炒香蒜末（约30秒），倒入整罐罐装番茄。
  - order: 3
    instruction: 加糖、盐、干香草，中火煮3-4分钟至酱汁微浓。倒入 double cream 搅匀。
    tip: 英国罐装番茄偏酸，加半勺糖可以中和酸味。
  - order: 4
    instruction: 放入意面，加1-2勺面汤翻拌均匀，让酱汁充分包裹面条。小火煮1分钟即可出锅。
video_links: []
common_mistakes:
  - 罐装番茄的汁水没倒完——整罐倒进去才是正确的，汁水也是酱汁的一部分。
  - cream 加太多——太多会太腻，100ml 即可，让颜色变成橙粉色就好。
  - 忘了加糖——罐装番茄在英式口味中偏酸，糖是平衡酸甜的关键。
