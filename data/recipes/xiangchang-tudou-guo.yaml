id: xiangchang-tudou-guo
name:
  zh: 香肠土豆锅
  pinyin: Xiangchang Tudou Guo
  en: Sausage Potato Pan
description: "用英国香肠和土豆做一锅热菜，偏融合但很适合冷天。"
difficulty: 2
time_minutes: 28
servings: 2
cuisine: 留学生厨房菜
recipe_type: fusion
budget_level: medium
scenarios: [pan_only, tesco_friendly, meal_prep, low_smoke]
tags: [融合菜, 一锅出, 土豆, 香肠]
equipment:
  required_ids: [nonstick-pan, lid, knife-board]
  required: [不粘锅, 锅盖或锡纸, 菜刀和砧板]
  substitutes_if_missing: "没有锅盖可用锡纸盖住。"
base_ingredients:
  - ingredient_id: sausage
    name_zh: 英式香肠
    name_en: Sausages
    amount: "3-4 根"
  - ingredient_id: tudou
    amount: "2 个"
  - ingredient_id: yangcong
    amount: "半个"
  - ingredient_id: heihujiao
    amount: "适量"
  - ingredient_id: shiyongyou
    amount: "1 汤匙"
steps:
  - order: 1
    instruction: "土豆切小块，洋葱切丝，香肠切段。"
  - order: 2
    instruction: "锅里放油，先煎香肠到表面上色。"
  - order: 3
    instruction: "加入土豆和洋葱，撒黑胡椒，翻匀后加一点水。"
  - order: 4
    instruction: "盖盖焖 10-12 分钟，到土豆变软。"
video_links: []
common_mistakes:
  - "土豆块太大不容易熟。"
  - "香肠本身有盐，先别额外加太多盐。"
