id: qingzheng-yu
name:
  zh: 清蒸鲈鱼 / 清蒸三文鱼
  pinyin: Qingzheng Luyu / Qingzheng Sanwenyu
  en: Steamed Sea Bass / Steamed Salmon
description: 英国超市鱼类品质高且价格合理。利用宿舍烤箱或微波炉简单蒸制，中式调味保留鲜味，是一道健康又体面的主菜。
cover_image:
  src: /recipe-media/qingzheng-yu-cover.jpg
  alt: 清蒸鲈鱼 / 清蒸三文鱼真实成品图
  caption: 清蒸鲈鱼 / 清蒸三文鱼
