pack_id: uk-first-week
region: uk
title: 英国落地：前 7 天厨房搭建
summary: "先确认宿舍规则和厨房设备，再用一套低预算采购把第一餐、带饭和后续补货跑起来。不要急着把中国厨房原样搬过去。"
sections:
  - title: 落地当天：先能吃上一顿，也先避开规则坑
    priority: today
    items:
      - name: 厨房与宿舍规则检查
        category: 落地检查
        where_to_buy: [住宿欢迎手册, 前台, 物业或室友]
        estimated_budget: "£0"
        note: "确认炉灶类型、是否允许电饭煲/空气炸锅、烟雾报警器位置和垃圾分类；入住时顺手拍下厨房现状。"
      - name: 清洁与收纳基础包
        category: 清洁
        where_to_buy: [Tesco, Sainsbury's, Lidl, Aldi, Poundland]
        estimated_budget: "£3-£10"
        note: "洗洁精、海绵、厨房纸、垃圾袋、密封袋先买齐。共用厨房里，清洁用品比升级厨具更早派上用场。"
      - name: 第一餐食材包
        category: 食材
        where_to_buy: [Tesco, Sainsbury's, Lidl, Aldi]
        estimated_budget: "£8-£15"
        note: "鸡蛋、番茄、洋葱、鸡腿肉、冷冻蔬菜和主食就能完成炒蛋、盖饭或焖饭；先买容错高、能多次使用的食材。"
      - name: 盐、食用油与生抽
        category: 调料
        where_to_buy: [Tesco, Sainsbury's, 当地亚超]
        estimated_budget: "£5-£12"
        note: "盐和油任意超市都可买；生抽优先去亚超或大型 Tesco 的世界食品区，先满足基础家常菜即可。"
      - name: 可重复使用购物袋
        category: 日用
        where_to_buy: [任意超市, Poundland, IKEA]
        estimated_budget: "£1-£4"
        note: "英国多数超市购物袋收费。折叠购物袋从第一天起就能减少临时支出。"
  - title: 三天内：让厨房进入稳定做饭模式
    priority: three_days
    items:
      - name: 适配炉灶的不粘平底锅
        category: 厨具
        where_to_buy: [IKEA, Argos, ASDA, Tesco Extra]
        estimated_budget: "£10-£25"
        note: "24-28cm 最通用。若宿舍是 induction hob，购买前确认锅底有电磁炉适配标识。"
      - name: 小奶锅、滤网与硅胶锅铲
        category: 厨具
        where_to_buy: [IKEA, Argos, Tesco, Sainsbury's]
        estimated_budget: "£12-£28"
        note: "煮面、焯菜、热汤都靠它们；硅胶铲能保护不粘锅，别用金属铲硬刮。"
      - name: 米、面条与微波米饭
        category: 主食
        where_to_buy: [Tesco, Sainsbury's, Lidl, Aldi, 当地亚超]
        estimated_budget: "£6-£18"
        note: "没有电饭煲前先用微波米饭或锅煮米；长期吃米饭再决定是否购入小电饭煲。"
      - name: 中餐风味补充包
        category: 调料
        where_to_buy: [当地亚超, Wing Yip, SeeWoo, 大型 Tesco]
        estimated_budget: "£10-£22"
        note: "老抽、蚝油、香油、淀粉和陈醋按做饭频率补，不必一次买齐。调料更适合去亚超，基础蔬菜和蛋白质留给平价超市。"
      - name: 保鲜盒、标签贴与冰箱分区
        category: 收纳
        where_to_buy: [IKEA, Tesco, Sainsbury's, Poundland]
        estimated_budget: "£4-£15"
        note: "共用厨房把食物标上姓名和日期；剩菜分装冷藏，能显著减少点外卖和食材浪费。"
  - title: 有预算再买：降低后续做饭摩擦
    priority: optional
    items:
      - name: 小型电饭煲
        category: 厨具
        where_to_buy: [Argos, Amazon UK, 当地亚超, 二手群]
        estimated_budget: "£25-£45"
        note: "先确认宿舍是否允许。单人 0.6L-1L 足够；如果只待一学期，优先看二手转让。"
      - name: 厨房剪刀、削皮刀与量勺
        category: 厨具
        where_to_buy: [IKEA, Argos, Amazon UK]
        estimated_budget: "£6-£18"
        note: "属于降低做饭摩擦的升级件。刀具如从国内携带，必须托运；在当地购买时按商店要求出示年龄证明。"
      - name: 购物小推车或大容量购物袋
        category: 日用
        where_to_buy: [IKEA, Argos, Amazon UK, 二手平台]
        estimated_budget: "£8-£30"
        note: "住得离超市远或需要一次补货时很省力。和室友合伙采购大包装米、油和冷冻蔬菜更划算。"
      - name: 风味扩展调料
        category: 调料
        where_to_buy: [当地亚超, 大型 Tesco, Sainsbury's]
        estimated_budget: "£8-£20"
        note: "咖喱块、辣椒油、豆瓣酱和火锅底料按自己的饮食习惯慢慢补；液体调料不建议从国内大量带。"
