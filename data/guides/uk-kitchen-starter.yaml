guide_id: uk-kitchen-starter
region: uk
title: 英国落地 48 小时厨房搭建
summary: "给刚到英国的新生：先用最少预算搭出能煮饭、炒蛋、做盖饭的厨房环境。"
sections:
  - title: 第一天先买什么
    items:
      - "不粘平底锅 24-28cm：Argos、IKEA 或大型超市可以买到。"
      - "硅胶锅铲：保护不粘锅，比金属铲安全。"
      - "盐、糖、生抽、食用油：先满足 80% 家常菜。"
      - "鸡蛋、番茄、洋葱、冷冻青豆、鸡腿肉：便宜且容错高。"
  - title: 第二天补齐什么
    items:
      - "小电饭煲：长期吃米饭会省心很多。"
      - "老抽、香油、陈醋、淀粉：让炒饭、盖饭和川菜更接近中餐味。"
      - "备菜碗或保鲜盒：调汁和腌肉会简单很多。"
  - title: 在英国怎么买中餐调料
    items:
      - "Tesco/Sainsbury's/Waitrose 的世界食品区常见 soy sauce、sesame oil、rice vinegar。"
      - "亚超更适合买生抽、老抽、料酒、郫县豆瓣酱、花椒。"
      - "Lidl/Aldi 更适合补鸡蛋、番茄、洋葱、鸡肉和冷冻蔬菜。"
  - title: 宿舍厨房注意事项
    items:
      - "先确认是否允许电饭煲、空气炸锅等电器。"
      - "油烟大时少做爆炒，优先盖饭、煎炒、焖饭。"
      - "共用厨房调料要贴标签，避免被误用。"
