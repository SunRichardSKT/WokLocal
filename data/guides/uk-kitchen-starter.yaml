guide_id: uk-kitchen-starter
region: uk
title: 英国厨房路线图：出发前到第一周
summary: "把打包、超市选择、共享厨房规则和预算策略分开处理。先建立一个能持续做饭的系统，再慢慢补回熟悉的家乡味。"
sections:
  - title: 出发前：轻便、耐用的东西才值得带
    items:
      - "建议带：顺手的筷子、饭勺或量米杯、轻便硅胶铲、小剪刀，以及少量干辣椒、花椒、五香粉等干货。"
      - "不建议带：大炒锅、砂锅、成套碗盘、重型电器和大量液体调料；这些占行李空间，英国本地或亚超都能补齐。"
      - "如果携带菜刀或削皮刀，必须放进托运行李；不要放在手提行李中。"
  - title: 超市路线：不同地方买不同东西
    items:
      - "Aldi / Lidl：鸡蛋、蔬菜、水果、面包、冷冻蔬菜等基础囤货；先看价格和保质期，不追求一次买全。"
      - "Tesco / Sainsbury's：日常补货、世界食品区和临时应急；办理 Clubcard 或 Nectar 后再比较会员价。"
      - "当地亚超：生抽、老抽、蚝油、香油、料酒、豆瓣酱和米；调料与大包装主食集中买更省事。"
      - "IKEA / Argos：锅具、保鲜盒、滤网和基础餐具；先确认炉灶是否为电磁炉，再选锅底适配标识。"
  - title: 共享厨房：先安全，再讲锅气
    items:
      - "烟雾报警器通常很敏感。优先蒸、煮、焖、烤和小火煎；需要炒菜时开窗、开抽油烟机，并控制油温。"
      - "多数住宿对电饭煲、空气炸锅等电器有自己的规定。购买前问清楚，避免因为违规电器带来麻烦。"
      - "微波炉里不要放金属容器或密封罐；食物加热前留出排气口。"
      - "食物、保鲜盒和调料贴姓名与日期；用完立即清洁，比事后解释更省心。"
  - title: 第一周预算：把钱花在能重复使用的地方
    items:
      - "第一轮采购优先覆盖 3-4 道会反复做的菜，而不是买一整套调料。"
      - "平价超市买基础食材，亚超买关键调料，按需要补货；不要在市中心亚超一次囤太多易坏食材。"
      - "留意临期折扣和会员价，但只买自己一两天内能吃掉或能冷冻的东西。"
      - "和室友合伙买大包装米、油、冷冻蔬菜前，先约好储存空间和分摊方式。"
supermarkets:
  - name: Aldi
    kind: budget
    price_level: low
    best_for: [鸡蛋和牛奶, 基础蔬菜, 面包, 冷冻食品]
    note: "自有品牌多、选择精简，适合固定采购基础食材；亚洲调料不是强项。"
  - name: Lidl
    kind: budget
    price_level: low
    best_for: [烘焙面包, 乳制品, 水果蔬菜, 每周主题商品]
    note: "适合低预算日常囤货。门店之间品类差异较大，看到常用货可以顺手补。"
  - name: Tesco
    kind: mainstream
    price_level: medium
    best_for: [日常补货, 世界食品区, Meal Deal, 清洁日用]
    membership: "Clubcard 常有会员价；Express 通常比大型门店贵。"
    note: "覆盖面最广，适合作为默认补货点。周末大采购优先找 Superstore 或 Extra。"
  - name: Sainsbury's
    kind: mainstream
    price_level: medium
    best_for: [生鲜, 水果蔬菜, 日常杂货, 烘焙]
    membership: "Nectar 可积累积分并提供个性化价格。"
    note: "整体比平价超市贵一些，但生鲜品质较稳定，适合离宿舍近时作为主力店。"
  - name: ASDA
    kind: mainstream
    price_level: low
    best_for: [大包装食材, 家居日用, 合租采购, 厨房基础用品]
    note: "大型门店适合一次补齐食品与日用品，通常更适合住在非市中心的学生。"
  - name: M&S Food
    kind: premium
    price_level: high
    best_for: [Ready Meals, 甜点, 半成品, 偶尔改善伙食]
    note: "不适合全套日常采购，但在不想做饭或想买稳定半成品时很省心。"
  - name: Waitrose
    kind: premium
    price_level: high
    best_for: [肉类, 海鲜, 有机食品, 高品质生鲜]
    note: "适合有明确品质需求时定点购买，不必把全部基础食材都放在这里买。"
  - name: Iceland
    kind: specialty
    price_level: low
    best_for: [冷冻蔬菜, 冷冻肉类, 快速料理, 批量备餐]
    note: "冷冻品类丰富，适合时间紧或冰箱冷冻空间充足的学生。"
  - name: 当地亚超
    kind: asian
    price_level: mixed
    best_for: [中式调料, 大米面条, 火锅食材, 冷冻点心]
    note: "只买普通英超难找的关键商品；蔬果和基础肉类通常仍在 Aldi、Lidl 或 Tesco 更合算。"
